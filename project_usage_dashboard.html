<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目总使用情况看板</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #16324f;
      --muted: #6b7c93;
      --line: #dbe4f0;
      --brand: #1f4e78;
      --brand-soft: #dce8f6;
      --green: #0f9d58;
      --green-soft: #e7f6ee;
      --orange: #ff8a3d;
      --orange-soft: #fff0e6;
      --blue: #2f6fed;
      --blue-soft: #eaf1ff;
      --shadow: 0 18px 40px rgba(31, 78, 120, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(47, 111, 237, 0.12), transparent 24%),
        radial-gradient(circle at left top, rgba(15, 157, 88, 0.10), transparent 18%),
        var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    .hero {
      display: grid;
      gap: 10px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.2;
    }

    .subtitle {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
      max-width: 920px;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .chip {
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(31, 78, 120, 0.08);
      box-shadow: var(--shadow);
      border-radius: 999px;
      padding: 10px 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .kpi-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 24px;
    }

    .two-col {
      grid-template-columns: 1.3fr 0.9fr;
      margin-bottom: 18px;
    }

    .panel {
      background: var(--card);
      border: 1px solid rgba(31, 78, 120, 0.08);
      border-radius: 22px;
      padding: 18px 18px 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .panel-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .kpi-card {
      padding: 20px;
      border-radius: 22px;
      min-height: 156px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .kpi-card.green { background: linear-gradient(180deg, var(--green-soft), #fff); }
    .kpi-card.blue { background: linear-gradient(180deg, var(--blue-soft), #fff); }
    .kpi-card.orange { background: linear-gradient(180deg, var(--orange-soft), #fff); }
    .kpi-card.brand { background: linear-gradient(180deg, var(--brand-soft), #fff); }

    .kpi-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .kpi-value {
      font-size: 36px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .kpi-sub {
      color: var(--muted);
      font-size: 13px;
    }

    .trend-list {
      display: grid;
      gap: 12px;
    }

    .trend-row {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr) 74px;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }

    .trend-label { color: var(--muted); }

    .track {
      position: relative;
      height: 12px;
      border-radius: 999px;
      background: #edf2f7;
      overflow: hidden;
    }

    .bar {
      position: absolute;
      inset: 0 auto 0 0;
      border-radius: 999px;
    }

    .bar.green { background: linear-gradient(90deg, #18a869, #4ecb8a); }
    .bar.blue { background: linear-gradient(90deg, #3c7eff, #79a7ff); }
    .bar.orange { background: linear-gradient(90deg, #ff8a3d, #ffb172); }

    .chart-wrap {
      width: 100%;
      overflow-x: auto;
    }

    svg.chart {
      width: 100%;
      min-width: 720px;
      height: 320px;
      display: block;
    }

    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 99px;
    }

    .rank-list {
      display: grid;
      gap: 10px;
    }

    .rank-toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .month-picker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: white;
      border-radius: 14px;
      min-height: 48px;
    }

    .month-mobile {
      display: none;
      width: 100%;
      position: relative;
    }

    .month-mobile-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      background: white;
      border-radius: 14px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      box-shadow: var(--shadow);
    }

    .month-mobile-btn::after {
      content: "▾";
      color: var(--muted);
      font-size: 14px;
      flex: 0 0 auto;
    }

    .month-mobile-btn.open::after {
      content: "▴";
    }

    .month-mobile-summary {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .month-mobile-panel {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      z-index: 20;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 20px 40px rgba(31, 78, 120, 0.12);
      padding: 12px;
      backdrop-filter: blur(10px);
    }

    .month-mobile-panel.open {
      display: block;
    }

    .month-mobile-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .month-mobile-action {
      border: 0;
      background: transparent;
      color: var(--brand);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 0;
    }

    .month-mobile-list {
      display: grid;
      gap: 8px;
      max-height: 260px;
      overflow: auto;
    }

    .month-mobile-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfdff;
      font-size: 13px;
      color: var(--text);
    }

    .month-mobile-item input {
      width: 16px;
      height: 16px;
      accent-color: var(--brand);
      flex: 0 0 auto;
    }

    .scroll-hint {
      display: none;
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .month-check {
      position: relative;
      display: inline-flex;
      align-items: center;
      cursor: pointer;
    }

    .month-check input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .month-pill {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #f8fbff;
      color: var(--muted);
      font-size: 13px;
      transition: all .18s ease;
    }

    .month-check input:checked + .month-pill {
      background: var(--brand);
      color: white;
      border-color: var(--brand);
      box-shadow: 0 8px 20px rgba(31, 78, 120, 0.18);
    }

    .rank-row {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) 72px;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, #fff, #fbfdff);
    }

    .rank-row.clickable {
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .rank-row.clickable:hover {
      transform: translateY(-1px);
      border-color: rgba(31, 78, 120, 0.18);
      box-shadow: 0 12px 28px rgba(31, 78, 120, 0.08);
    }

    .rank-row.active {
      border-color: var(--brand);
      background: linear-gradient(180deg, #f4f8ff, #ffffff);
      box-shadow: 0 12px 28px rgba(31, 78, 120, 0.10);
    }

    .rank-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--brand-soft);
      color: var(--brand);
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
    }

    .rank-name {
      font-size: 14px;
      font-weight: 700;
    }

    .rank-meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .rank-value {
      font-size: 18px;
      font-weight: 800;
      text-align: right;
    }

    .table-wrap {
      overflow: auto;
      border-radius: 18px;
      border: 1px solid var(--line);
      position: relative;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
      background: white;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: nowrap;
      font-size: 13px;
    }

    th:first-child, td:first-child {
      text-align: left;
      position: sticky;
      left: 0;
      background: white;
      min-width: 120px;
      box-shadow: 6px 0 10px rgba(22, 50, 79, 0.04);
    }
    thead th {
      background: #f8fbff;
      color: var(--muted);
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    tbody tr:nth-child(odd) td { background: #fcfdff; }
    tbody tr:nth-child(odd) td:first-child { background: #fcfdff; }
    thead th:first-child { z-index: 4; background: #f8fbff; }
    tbody td:first-child { z-index: 3; }

    .ranking-table {
      min-width: 1880px;
      table-layout: fixed;
    }

    .ranking-table th,
    .ranking-table td {
      padding: 10px 10px;
      font-size: 12px;
    }

    .ranking-table th:first-child,
    .ranking-table td:first-child {
      min-width: 110px;
      width: 110px;
    }

    .ranking-table th:nth-child(2),
    .ranking-table td:nth-child(2) {
      text-align: left;
      min-width: 150px;
      width: 150px;
      max-width: 150px;
    }

    .ranking-table th:nth-child(3),
    .ranking-table td:nth-child(3) {
      text-align: left;
      min-width: 70px;
      width: 70px;
      max-width: 70px;
    }

    .ranking-table th:nth-child(4),
    .ranking-table td:nth-child(4) {
      text-align: left;
      min-width: 280px;
      width: 280px;
      max-width: 280px;
    }

    .project-cell {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .metric-col {
      width: 96px;
      min-width: 96px;
    }

    .month-rate-col {
      width: 76px;
      min-width: 76px;
    }

    th.sortable {
      cursor: pointer;
      user-select: none;
    }

    th.sortable:hover {
      color: var(--brand);
    }

    .table-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .tab-btn {
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      transition: all .2s ease;
    }

    .tab-btn.active {
      background: var(--brand);
      color: white;
      border-color: var(--brand);
    }

    .story {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-bottom: 18px;
    }

    .story-card {
      padding: 16px 18px;
      border-radius: 18px;
      background: white;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .story-card h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .story-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .region-toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .region-select {
      min-width: 220px;
      border: 1px solid var(--line);
      background: white;
      border-radius: 12px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
    }

    .mini-kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .mini-kpi {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: linear-gradient(180deg, #fff, #f9fbff);
    }

    .mini-kpi .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .mini-kpi .value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .focus-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 18px;
    }

    .focus-card {
      padding: 16px 18px;
      border-radius: 18px;
      background: linear-gradient(180deg, #fff, #f8fbff);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      display: grid;
      gap: 8px;
    }

    .focus-card .focus-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .focus-card .focus-main {
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
    }

    .focus-card .focus-sub {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .tooltip {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      max-width: 260px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(17, 27, 43, 0.92);
      color: white;
      font-size: 12px;
      line-height: 1.6;
      box-shadow: 0 16px 36px rgba(10, 23, 44, 0.28);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .12s ease, transform .12s ease;
      white-space: pre-line;
    }

    .tooltip.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1100px) {
      .kpi-grid, .two-col, .story, .focus-grid { grid-template-columns: 1fr; }
      .mini-kpis { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 760px) {
      .page {
        padding: 20px 12px 40px;
      }

      h1 {
        font-size: 26px;
      }

      .subtitle {
        font-size: 13px;
        line-height: 1.6;
      }

      .panel {
        border-radius: 18px;
        padding: 14px 14px 12px;
      }

      .panel-head {
        align-items: start;
        flex-direction: column;
        margin-bottom: 12px;
      }

      .panel-title {
        font-size: 17px;
      }

      .rank-toolbar {
        gap: 10px;
        align-items: stretch;
      }

      .month-picker {
        display: none;
      }

      .month-mobile {
        display: block;
      }

      .region-select {
        width: 100%;
        min-width: 0;
      }

      .rank-row {
        grid-template-columns: 28px minmax(0, 1fr) 64px;
        gap: 10px;
        padding: 10px;
        align-items: start;
      }

      .rank-name {
        font-size: 13px;
        line-height: 1.45;
      }

      .rank-meta {
        font-size: 11px;
        line-height: 1.45;
      }

      .rank-value {
        font-size: 16px;
        padding-top: 2px;
      }

      .table-wrap {
        margin: 0 -2px;
      }

      .scroll-hint {
        display: block;
      }

      .ranking-table {
        min-width: 1560px;
      }

      .ranking-table th,
      .ranking-table td {
        padding: 9px 8px;
        font-size: 11px;
      }

      .ranking-table th:first-child,
      .ranking-table td:first-child {
        min-width: 90px;
        width: 90px;
      }

      .ranking-table th:nth-child(2),
      .ranking-table td:nth-child(2) {
        min-width: 110px;
        width: 110px;
        max-width: 110px;
      }

      .ranking-table th:nth-child(3),
      .ranking-table td:nth-child(3) {
        min-width: 56px;
        width: 56px;
        max-width: 56px;
      }

      .ranking-table th:nth-child(4),
      .ranking-table td:nth-child(4) {
        min-width: 220px;
        width: 220px;
        max-width: 220px;
      }

      .metric-col {
        width: 82px;
        min-width: 82px;
      }

      .month-rate-col {
        width: 70px;
        min-width: 70px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>各区域在售项目总使用情况排名</h1>
      <div class="subtitle">支持选择月份叠加与终端口径切换，点击区域后进入独立详情页查看该区域在售项目总使用情况。</div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <h2 class="panel-title">区域整体排名</h2>
          <div class="panel-note">支持选择月份叠加，默认选中前一个月；支持按整体、移动端、PC 端切换排名口径，点击区域可直接进入独立详情页。</div>
        </div>
      </div>
      <div class="rank-toolbar">
        <label class="panel-note">选择月份</label>
        <div id="rankMonthPicker" class="month-picker"></div>
        <div id="rankMonthMobile" class="month-mobile">
          <button id="rankMonthMobileBtn" class="month-mobile-btn" type="button">
            <span id="rankMonthMobileSummary" class="month-mobile-summary"></span>
          </button>
          <div id="rankMonthMobilePanel" class="month-mobile-panel">
            <div class="month-mobile-actions">
              <button id="rankMonthMobileClear" class="month-mobile-action" type="button">清空</button>
              <button id="rankMonthMobileDone" class="month-mobile-action" type="button">完成</button>
            </div>
            <div id="rankMonthMobileList" class="month-mobile-list"></div>
          </div>
        </div>
        <label for="terminalSelect" class="panel-note">选择终端</label>
        <select id="terminalSelect" class="region-select" style="min-width:180px;">
          <option value="整体活跃率">整体活跃率</option>
          <option value="移动活跃率">移动端活跃率</option>
          <option value="PC活跃率">PC端活跃率</option>
        </select>
      </div>
      <div class="scroll-hint">手机端可左右滑动月份选项；点击区域后进入详情页。</div>
      <div class="rank-list" id="overallRankList"></div>
    </section>

    <section class="panel" style="margin-top:18px;">
      <div class="panel-head">
        <div>
          <h2 class="panel-title">全部在售项目总使用排名</h2>
          <div class="panel-note">按项目总负责人汇总展示所属区域、职级、整体访问次数、月均访问次数、移动端月均访问次数、PC月均访问次数和各月访问次数。支持按列排序，首列固定便于横向查看。</div>
        </div>
      </div>
      <div class="scroll-hint">表格列较多，手机端可左右滑动查看完整字段和月份。</div>
      <div class="table-wrap">
        <table class="ranking-table">
          <thead id="peopleRankHead"></thead>
          <tbody id="peopleRankBody"></tbody>
        </table>
      </div>
    </section>

  </div>

  <div id="tooltip" class="tooltip"></div>

  <script src="./project_usage_base_data.js"></script>
  <script src="./project_usage_extra_data.js"></script>
  <script>
    const fmtPct = (n) => `${(n * 100).toFixed(2)}%`;
    const fmtNum = (n) => `${Number(n || 0)}`;
    const tooltip = document.getElementById('tooltip');
    const validRegionRows = DATA.regions.filter(d => d['区域名称']);
    const monthColumns = [...new Set(validRegionRows.map(d => d['年月']))].sort((a, b) => b.localeCompare(a, 'zh-CN'));
    const regionNames = [...new Set(validRegionRows.map(d => d['区域名称']))];
    const latest = DATA.monthly[DATA.monthly.length - 1];

    function showTooltip(text, x, y) {
      tooltip.textContent = text;
      tooltip.classList.add('show');
      const pad = 16;
      const width = tooltip.offsetWidth || 220;
      const height = tooltip.offsetHeight || 48;
      const left = Math.min(window.innerWidth - width - pad, x + 14);
      const top = Math.max(pad, y - height - 16);
      tooltip.style.left = `${left}px`;
      tooltip.style.top = `${top}px`;
    }

    function hideTooltip() {
      tooltip.classList.remove('show');
    }

    document.addEventListener('mousemove', (e) => {
      const el = e.target.closest('[data-tooltip]');
      if (!el) {
        hideTooltip();
        return;
      }
      showTooltip(el.dataset.tooltip, e.clientX, e.clientY);
    });

    document.addEventListener('mouseleave', hideTooltip);

    function renderLineChart(svgId, rows, maxY, notePrefix = '') {
      const svg = document.getElementById(svgId);
      const width = 900;
      const height = 320;
      const margin = { top: 24, right: 24, bottom: 46, left: 54 };
      const innerW = width - margin.left - margin.right;
      const innerH = height - margin.top - margin.bottom;
      const x = (i) => margin.left + (innerW / ((rows.length - 1) || 1)) * i;
      const y = (v) => margin.top + innerH - (v / maxY) * innerH;

      const gridSteps = maxY >= 0.8 ? [0, 0.2, 0.4, 0.6, 0.8] : [0, 0.2, 0.4, 0.6];
      const grid = gridSteps.map(v =>
        `<g>
          <line x1="${margin.left}" y1="${y(v)}" x2="${width - margin.right}" y2="${y(v)}" stroke="#e7eef7" />
          <text x="${margin.left - 10}" y="${y(v) + 4}" font-size="12" fill="#8aa">${(v * 100).toFixed(0)}%</text>
        </g>`
      ).join('');

      const makePath = (key) => rows.map((d, i) => `${i === 0 ? 'M' : 'L'} ${x(i)} ${y(d[key])}`).join(' ');
      const drawDots = (key, color, label) => rows.map((d, i) =>
        `<g>
          <circle cx="${x(i)}" cy="${y(d[key])}" r="5" fill="${color}" data-tooltip="${notePrefix}${d['年月']}\n${label}：${fmtPct(d[key])}" />
        </g>`
      ).join('');

      const labels = rows.map((d, i) =>
        `<text x="${x(i)}" y="${height - 16}" text-anchor="middle" font-size="12" fill="#6b7c93">${d['年月']}</text>`
      ).join('');

      svg.innerHTML = `
        ${grid}
        <path d="${makePath('整体活跃率')}" fill="none" stroke="#0f9d58" stroke-width="3" stroke-linecap="round" />
        <path d="${makePath('移动活跃率')}" fill="none" stroke="#2f6fed" stroke-width="3" stroke-linecap="round" />
        <path d="${makePath('PC活跃率')}" fill="none" stroke="#ff8a3d" stroke-width="3" stroke-linecap="round" />
        ${drawDots('整体活跃率', '#0f9d58', '整体活跃率')}
        ${drawDots('移动活跃率', '#2f6fed', '移动端活跃率')}
        ${drawDots('PC活跃率', '#ff8a3d', 'PC端活跃率')}
        ${labels}
      `;
    }

    let selectedRegion = DATA.latestRegion[0]['区域名称'];
    let selectedTerminal = '整体活跃率';
    let peopleSortField = '整体访问次数';
    let peopleSortDir = 'desc';
    const isMobileViewport = () => window.matchMedia('(max-width: 760px)').matches;
    const defaultRankMonth = monthColumns[Math.max(0, monthColumns.length - 2)];
    let mobileSelectedMonths = [defaultRankMonth];

    function syncMobileMonthSummary() {
      const summary = document.getElementById('rankMonthMobileSummary');
      if (!summary) return;
      summary.textContent = mobileSelectedMonths.length ? `已选 ${mobileSelectedMonths.length} 个月：${mobileSelectedMonths.join('、')}` : '请选择月份';
    }

    function renderMobileMonthOptions() {
      const list = document.getElementById('rankMonthMobileList');
      if (!list) return;
      list.innerHTML = monthColumns.map(name => `
        <label class="month-mobile-item">
          <span>${name}</span>
          <input class="rank-month-mobile-input" type="checkbox" value="${name}" ${mobileSelectedMonths.includes(name) ? 'checked' : ''}>
        </label>
      `).join('');
      syncMobileMonthSummary();
    }

    function getSelectedRankMonths() {
      if (isMobileViewport()) {
        return mobileSelectedMonths.length ? mobileSelectedMonths : [defaultRankMonth];
      }
      const values = [...document.querySelectorAll('.rank-month-input:checked')].map(input => input.value);
      return values.length ? values : [defaultRankMonth];
    }

    function renderOverallRanks() {
      const months = getSelectedRankMonths();
      const metric = selectedTerminal;
      const rows = regionNames.map(region => {
        const matched = validRegionRows.filter(item => item['区域名称'] === region && months.includes(item['年月']));
        if (!matched.length) return null;
        const avg = matched.reduce((sum, item) => sum + item[metric], 0) / matched.length;
        const peopleAvg = matched.reduce((sum, item) => sum + item['在售项目总人数'], 0) / matched.length;
        return {
          区域名称: region,
          口径: metric,
          选中月份: months.join('、'),
          排名值: avg,
          在售项目总人数: peopleAvg,
          明细数: matched.length
        };
      }).filter(Boolean).sort((a, b) => b['排名值'] - a['排名值'] || b['在售项目总人数'] - a['在售项目总人数'] || a['区域名称'].localeCompare(b['区域名称']));

      document.getElementById('overallRankList').innerHTML = rows.map((row, idx) => `
        <div class="rank-row clickable ${row['区域名称'] === selectedRegion ? 'active' : ''}" data-region="${row['区域名称']}" data-tooltip="${row['区域名称']}\n口径：${metric}\n月份：${row['选中月份']}\n平均值：${fmtPct(row['排名值'])}\n平均在售项目总人数：${fmtNum(row['在售项目总人数'].toFixed(1))}">
          <div class="rank-num">${idx + 1}</div>
          <div>
            <div class="rank-name">${row['区域名称']}</div>
            <div class="rank-meta">${months.join('、')} 平均值，口径 ${metric.replace('率','')}</div>
          </div>
          <div class="rank-value">${fmtPct(row['排名值'])}</div>
        </div>
      `).join('');
    }

    function aggregatePeopleRanking(selectedMonths) {
      const monthCount = selectedMonths.length || 1;
      const map = new Map();
      EXTRA_DATA.people
        .filter(item => item['区域名称'] && (item['姓名'] || item['工号']) && selectedMonths.includes(item['年月']))
        .forEach(item => {
          const key = `${item['工号'] || ''}__${item['姓名'] || ''}`;
          if (!map.has(key)) {
            map.set(key, {
              工号: item['工号'] || '',
              姓名: item['姓名'] || '-',
              所属区域: item['区域名称'] || '-',
              管理项目集合: new Set(),
              职级集合: new Set(),
              整体访问次数: 0,
              移动端访问次数: 0,
              PC端访问次数: 0
            });
          }
          const row = map.get(key);
          if (item['分管项目名']) row['管理项目集合'].add(item['分管项目名']);
          if (item['职级']) row['职级集合'].add(item['职级']);
          row['整体访问次数'] += Number(item['总访问次数'] || 0);
          row['移动端访问次数'] += Number(item['移动端访问次数'] || 0);
          row['PC端访问次数'] += Number(item['PC端访问次数'] || 0);
          row[item['年月']] = (row[item['年月']] || 0) + Number(item['总访问次数'] || 0);
        });

      return [...map.values()].map(row => {
        const out = {
          姓名: row['姓名'],
          所属区域: row['所属区域'] || '-',
          职级: [...row['职级集合']].join('、') || '-',
          管理项目: [...row['管理项目集合']].join('、') || '-',
          整体访问次数: row['整体访问次数'],
          月平均访问次数: row['整体访问次数'] / monthCount,
          移动端月平均访问次数: row['移动端访问次数'] / monthCount,
          PC月平均访问次数: row['PC端访问次数'] / monthCount
        };
        selectedMonths.forEach(month => {
          out[month] = row[month] || 0;
        });
        return out;
      });
    }

    function renderPeopleRankingTable() {
      const selectedMonths = getSelectedRankMonths();
      const peopleRankingRows = aggregatePeopleRanking(selectedMonths);
      const dirMark = (field) => peopleSortField === field ? (peopleSortDir === 'desc' ? ' ↓' : ' ↑') : '';
      document.getElementById('peopleRankHead').innerHTML = `
        <tr>
          <th>项目总姓名</th>
          <th>所属区域</th>
          <th>职级</th>
          <th>管理项目</th>
          <th class="sortable metric-col" data-sort-field="整体访问次数">整体访问次数${dirMark('整体访问次数')}</th>
          <th class="sortable metric-col" data-sort-field="月平均访问次数">月平均访问次数${dirMark('月平均访问次数')}</th>
          <th class="sortable metric-col" data-sort-field="移动端月平均访问次数">移动端月平均访问次数${dirMark('移动端月平均访问次数')}</th>
          <th class="sortable metric-col" data-sort-field="PC月平均访问次数">PC月平均访问次数${dirMark('PC月平均访问次数')}</th>
          ${selectedMonths.map(month => `<th class="sortable month-rate-col" data-sort-field="${month}">${month}${dirMark(month)}</th>`).join('')}
        </tr>
      `;

      const rows = [...peopleRankingRows].sort((a, b) => {
        const left = a[peopleSortField] ?? '';
        const right = b[peopleSortField] ?? '';
        let result = 0;
        if (typeof left === 'number' && typeof right === 'number') {
          result = right - left;
        } else {
          result = String(right).localeCompare(String(left), 'zh-CN');
        }
        if (peopleSortDir === 'asc') result *= -1;
        if (result !== 0) return result;
        return String(a['姓名']).localeCompare(String(b['姓名']), 'zh-CN');
      });

      document.getElementById('peopleRankBody').innerHTML = rows.map(row => `
        <tr>
          <td>${row['姓名'] || '-'}</td>
          <td>${row['所属区域'] || '-'}</td>
          <td>${row['职级'] || '-'}</td>
          <td class="project-cell" title="${row['管理项目']}">${row['管理项目']}</td>
          <td>${fmtNum(row['整体访问次数'])}</td>
          <td>${row['月平均访问次数'].toFixed(1)}</td>
          <td>${row['移动端月平均访问次数'].toFixed(1)}</td>
          <td>${row['PC月平均访问次数'].toFixed(1)}</td>
          ${selectedMonths.map(month => `<td>${fmtNum(row[month] || 0)}</td>`).join('')}
        </tr>
      `).join('') || `<tr><td colspan="${8 + selectedMonths.length}">当前月份口径下暂无项目总访问记录</td></tr>`;
    }

    const rankMonthPicker = document.getElementById('rankMonthPicker');
    const rankMonthMobileBtn = document.getElementById('rankMonthMobileBtn');
    const rankMonthMobilePanel = document.getElementById('rankMonthMobilePanel');
    const rankMonthMobileClear = document.getElementById('rankMonthMobileClear');
    const rankMonthMobileDone = document.getElementById('rankMonthMobileDone');
    const terminalSelect = document.getElementById('terminalSelect');
    rankMonthPicker.innerHTML = monthColumns.map(name => `
      <label class="month-check">
        <input class="rank-month-input" type="checkbox" value="${name}" ${name === defaultRankMonth ? 'checked' : ''}>
        <span class="month-pill">${name}</span>
      </label>
    `).join('');
    renderMobileMonthOptions();
    rankMonthPicker.addEventListener('change', () => {
      renderOverallRanks();
      renderPeopleRankingTable();
    });
    rankMonthMobileBtn.addEventListener('click', () => {
      rankMonthMobileBtn.classList.toggle('open');
      rankMonthMobilePanel.classList.toggle('open');
    });
    rankMonthMobileClear.addEventListener('click', () => {
      mobileSelectedMonths = [];
      renderMobileMonthOptions();
    });
    rankMonthMobileDone.addEventListener('click', () => {
      const checked = [...document.querySelectorAll('.rank-month-mobile-input:checked')].map(input => input.value);
      mobileSelectedMonths = checked.length ? checked : [defaultRankMonth];
      renderMobileMonthOptions();
      rankMonthMobileBtn.classList.remove('open');
      rankMonthMobilePanel.classList.remove('open');
      renderOverallRanks();
      renderPeopleRankingTable();
    });
    document.addEventListener('change', (e) => {
      if (!e.target.classList.contains('rank-month-mobile-input')) return;
      mobileSelectedMonths = [...document.querySelectorAll('.rank-month-mobile-input:checked')].map(input => input.value);
      syncMobileMonthSummary();
    });
    document.addEventListener('click', (e) => {
      if (!isMobileViewport()) return;
      const mobileWrap = document.getElementById('rankMonthMobile');
      if (mobileWrap && !mobileWrap.contains(e.target)) {
        rankMonthMobileBtn.classList.remove('open');
        rankMonthMobilePanel.classList.remove('open');
      }
    });
    terminalSelect.addEventListener('change', (e) => {
      selectedTerminal = e.target.value;
      renderOverallRanks();
    });
    document.getElementById('overallRankList').addEventListener('click', (e) => {
      const row = e.target.closest('.rank-row');
      if (!row) return;
      selectedRegion = row.dataset.region;
      const months = getSelectedRankMonths().slice().sort();
      const month = months[months.length - 1] || DATA.latestMonth;
      const url = `./region_usage_detail.html?region=${encodeURIComponent(selectedRegion)}&month=${encodeURIComponent(month)}`;
      window.location.href = url;
    });
    document.getElementById('peopleRankHead').addEventListener('click', (e) => {
      const th = e.target.closest('[data-sort-field]');
      if (!th) return;
      const field = th.dataset.sortField;
      if (peopleSortField === field) {
        peopleSortDir = peopleSortDir === 'desc' ? 'asc' : 'desc';
      } else {
        peopleSortField = field;
        peopleSortDir = 'desc';
      }
      renderPeopleRankingTable();
    });

    renderOverallRanks();
    renderPeopleRankingTable();
  </script>
</body>
</html>
